name: Gossipsub Interoperability Tests (PR)

on:
  pull_request:
    paths:
      - 'gossipsub-interop/**'
      - '.github/workflows/gossipsub-interop-pr.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout eth-p2p-z
        uses: actions/checkout@v4
        with:
          repository: zen-eth/eth-p2p-z
          ref: feat/gossipsub
          path: ../eth-p2p-z

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gossipsub-interop/go-libp2p/go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Set up Zig 0.15.2
        run: |
          curl -fL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz \
            | sudo tar -xJ -C /usr/local
          sudo ln -sf /usr/local/zig-x86_64-linux-0.15.2/zig /usr/local/bin/zig
          zig version

      - name: Cache Zig global packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-0.15.2

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Shadow simulator
        run: |
          # Install Shadow dependencies
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            findutils \
            libclang-dev \
            libc-dbg \
            libglib2.0-0 \
            libglib2.0-dev \
            make \
            netbase \
            python3 \
            python3-networkx \
            xz-utils \
            zlib1g-dev

          # Build and install Shadow v3.3.0 from source
          git clone --depth 1 --branch v3.3.0 https://github.com/shadow/shadow.git shadow-simulator
          cd shadow-simulator
          git checkout v3.3.0
          ./setup build --clean
          ./setup install
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run gossipsub interop tests
        working-directory: gossipsub-interop
        run: make test
        continue-on-error: true

      - name: Run gossipsub interop tests (Zig)
        working-directory: gossipsub-interop
        run: make test-zig
        continue-on-error: true

      - name: Upload Shadow output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-output
          path: gossipsub-interop/shadow-outputs/
          retention-days: 5
